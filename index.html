<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analog Clock + 月曆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="切換明暗模式">🌙</button>
    <main class="container">
        <section class="clock-wrap">
            <div class="clock" aria-label="模擬時鐘">
                <div class="dial"></div>
                <div class="numbers">
                    <span class="number" data-num="12">12</span>
                    <span class="number" data-num="1">1</span>
                    <span class="number" data-num="2">2</span>
                    <span class="number" data-num="3">3</span>
                    <span class="number" data-num="4">4</span>
                    <span class="number" data-num="5">5</span>
                    <span class="number" data-num="6">6</span>
                    <span class="number" data-num="7">7</span>
                    <span class="number" data-num="8">8</span>
                    <span class="number" data-num="9">9</span>
                    <span class="number" data-num="10">10</span>
                    <span class="number" data-num="11">11</span>
                </div>
                <div class="hour-hand"></div>
                <div class="minute-hand"></div>
                <div class="second-hand"></div>
                <div class="center"></div>
            </div>
        </section>

        <section class="calendar-wrap">
            <div class="calendar">
                <div class="cal-header">
                    <button id="prev">◀</button>
                    <div class="month-year"></div>
                    <button id="next">▶</button>
                </div>
                <table class="calendar-table">
                    <thead>
                        <tr>
                            <th>日</th>
                            <th>一</th>
                            <th>二</th>
                            <th>三</th>
                            <th>四</th>
                            <th>五</th>
                            <th>六</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
